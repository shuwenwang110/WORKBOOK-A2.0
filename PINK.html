<head>
<title>Hello World</title>
<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 800px;
    cursor: none; 
}

#starsCanvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}

#light {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    z-index: 999;
    opacity: 1;
    pointer-events: none;
    transition: opacity 0.84s ease;
}
/* 悬浮放大 */
h1 {
    position: relative;
    z-index: 2;
    font-family: "Comic Sans MS", "Arial Rounded MT Bold", sans-serif;
    font-size: 120px;
    text-align: center;
    background-image: url("./PINK.jpg");
    background-size: cover;
    background-position: center;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    -webkit-text-stroke: 2px rgba(255,255,255,0.6);
    text-shadow:
        0 0 10px rgba(255,255,255,0.6),
        0 0 25px rgba(255,255,255,0.4),
        0 0 40px rgba(255,255,255,0.2);
    cursor: none; 
    transition: transform 0.3s ease; 
}
h1:hover {
    transform: scale(1.04); /* 放大 */
}
/* 光标+拖尾 */
.cursor {
    position: fixed;
    width: 0.8vw;
    height: 0.8vw;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    box-shadow: 0 0 0.6vw white, 0 0 1.2vw white;
    z-index: 3;
}
.trail {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    background: white;
    z-index: 3;
}
</style>
</head>
<body>

<canvas id="starsCanvas"></canvas>

<div id="light"></div>

<h1 id="text">HELLO WORLD!</h1>

<div class="cursor"></div>

<script>
/* 星空 */
const canvas = document.getElementById("starsCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;
let targetX = mouseX;
let targetY = mouseY;
document.addEventListener("mousemove", e => {
  targetX = e.clientX;
  targetY = e.clientY;
});
function smoothFollow() {
  mouseX += (targetX - mouseX) * 0.08;
  mouseY += (targetY - mouseY) * 0.08;
}
const layers = [
  { stars: [], speed: 0.02, count: 80 },
  { stars: [], speed: 0.05, count: 60 },
  { stars: [], speed: 0.08, count: 40 }
];
layers.forEach(layer => {
  for (let i = 0; i < layer.count; i++) {
    layer.stars.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      size: Math.random() * 1.2 + 0.3,
      twinkleOffset: Math.random() * Math.PI * 2
    });
  }
});
function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  smoothFollow();
  layers.forEach(layer => {
    layer.stars.forEach(star => {
      let offsetX = (mouseX - window.innerWidth / 2) * layer.speed;
      let offsetY = (mouseY - window.innerHeight / 2) * layer.speed;
      let twinkle = 0.5 + 0.5 * Math.sin(Date.now() * 0.001 + star.twinkleOffset);
      ctx.beginPath();
      ctx.arc(star.x + offsetX, star.y + offsetY, star.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${0.5 + twinkle * 0.5})`;
      ctx.fill();
    });
  });
  requestAnimationFrame(drawStars);
}
drawStars();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

/* 自定义光标+拖尾逻 */
const cursor = document.querySelector(".cursor");
let trails = [];
const trailCount = 10;

for (let i = 0; i < trailCount; i++) {
  let t = document.createElement("div");
  t.className = "trail";
  document.body.appendChild(t);
  trails.push({ el: t, x: 0, y: 0 });
}

document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
  trails[0].x = e.clientX;
  trails[0].y = e.clientY;
});
// 拖尾
function animateCursor() {
  for (let i = trails.length - 1; i > 0; i--) {
    trails[i].x += (trails[i-1].x - trails[i].x) * 0.5;
    trails[i].y += (trails[i-1].y - trails[i].y) * 0.5;
  }
  trails.forEach((t, i) => {
    let scale = 1 - i / trailCount;
    let opacity = 1 - i / trailCount;
    t.el.style.width = 10 * scale + "px";
    t.el.style.height = 10 * scale + "px";
    t.el.style.opacity = opacity;
    t.el.style.left = t.x + "px";
    t.el.style.top = t.y + "px";
  });
  requestAnimationFrame(animateCursor);
}
animateCursor();

/* 开灯渐入 */
window.addEventListener("load", () => {
    setTimeout(() => {
        document.getElementById("light").style.opacity = 0;
    }, 100);
});


const text = document.getElementById("text");
text.addEventListener("click", () => {
    const light = document.getElementById("light");
    light.style.opacity = 1;
    setTimeout(() => {
        window.location.href = "WEEK 1.html";
    }, 700);
});
</script>
</body>
</html>
