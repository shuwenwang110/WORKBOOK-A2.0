<head>
<title>WORKBOOK</title>
<style>
body {
  margin: 0;
  height: 100vh;
  background: black;
  overflow: hidden;
  cursor: none;
}
/* 星空 */
#starsCanvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}
/* 开灯 */
#light {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 100;
  opacity: 1;
  pointer-events: none;
  transition: opacity 1.2s ease;
}
/* 三组 */
.group {
  position: absolute;
  width: 18vw;
  height: 18vw;
  transform: translate(-50%, -50%);
  z-index: 2;
  transition: all 1.5s cubic-bezier(0.2,1.5,0.3,1);
}
#group1 { top: 50%; left: 20%; }
#group2 { top: 50%; left: 50%; }
#group3 { top: 50%; left: 80%; }
/* 回字 */
.box {
  position: absolute;
  border: 0.2vw solid;
  box-sizing: border-box;
  transform-origin: center;
  transition:
    transform 1.2s cubic-bezier(0.2,1.6,0.3,1),
    opacity 0.6s;
}
.red {
  width: 18vw;
  height: 18vw;
  border-color: #ffffff;
  box-shadow: 0 0 0.4vw #ffffff, 0 0 1vw #ffffff;
}
.blue {
  width: 14vw;
  height: 14vw;
  top: 2vw;
  left: 2vw;
  border-color: #a8a8a8;
  box-shadow: 0 0 0.4vw #a8a8a8, 0 0 1vw #a8a8a8;
}
.yellow {
  width: 10vw;
  height: 10vw;
  top: 4vw;
  left: 4vw;
  border-color: #616161;
  box-shadow: 0 0 0.4vw #616161, 0 0 1vw #616161;
}
/* 波浪 hover */
.yellow {
  transition: transform 0.5s cubic-bezier(0.2,1.6,0.3,1);
}
.blue {
  transition: transform 0.7s cubic-bezier(0.2,1.6,0.3,1);
}
.red {
  transition: transform 0.9s cubic-bezier(0.2,1.6,0.3,1);
}
.group:hover .yellow {
  transform: scale(0.75);
}
.group:hover .blue {
  transform: scale(0.85);
}
.group:hover .red {
  transform: scale(0.95);
}
/* 数字 */
.number {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  
  font-size: 5vw;
  font-weight: 700;
  
  color: white;
  text-shadow:
    0 0 1vw rgba(255,255,255,0.9),
    0 0 2vw rgba(255,255,255,0.7),
    0 0 3vw rgba(255,255,255,0.5);
  z-index: 3;
  transition: transform 0.6s ease, opacity 0.6s;
}
.group:hover .number {
  transform: translate(-50%, -50%) scale(1.3);
}
/* 黑幕 */
#fade {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  opacity: 0;
  pointer-events: none;
  z-index: 20;
  transition: opacity 1.2s ease;
}
/* 光标 */
.cursor {
  position: fixed;
  width: 0.8vw;
  height: 0.8vw;
  background: white;
  border-radius: 50%;
  pointer-events: none;
  box-shadow: 0 0 0.6vw white, 0 0 1.2vw white;
  z-index: 3;
}
/* 拖尾 */
.trail {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  background: white;
  z-index: 3;
}
/* 新增：信封按钮样式 */
#envelopeBtn {
  position: fixed;
  bottom: 5.5vw;
  left: 50%;
  transform: translateX(-50%);
  width: 50px;
  height: auto;
  cursor: pointer;
  z-index: 10;
  transition: transform 0.3s ease;
}
#envelopeBtn:hover {
  transform: translateX(-50%) scale(1.1);
}
/* 新增：日记图片弹窗样式 */
#diaryModal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  z-index: 50;
  display: none;
  align-items: center;
  justify-content: center;
  pointer-events: all;
}
#diaryImg {
  height: 90vh;
  width: auto;
  object-fit: contain;
}
/* 新增：关闭按钮样式 */
#closeDiary {
  position: absolute;
  top: 2vw;
  right: 5vw;
  color: white;
  font-size: 1.5vw;
  cursor: pointer;
  user-select: none;
  transition: color 0.3s ease;
}
#closeDiary:hover {
  color: #cccccc;
}
</style>
</head>
<body>
<canvas id="starsCanvas"></canvas>
<div id="light"></div>
<div id="group1" class="group">
  <div class="box red"></div>
  <div class="box blue"></div>
  <div class="box yellow"></div>
  <div class="number" onclick="goPage(document.getElementById('group1'),'PINK.html')">1</div>
</div>
<div id="group2" class="group">
  <div class="box red"></div>
  <div class="box blue"></div>
  <div class="box yellow"></div>
  <div class="number" onclick="goPage(document.getElementById('group2'),'WEEK 2.html')">2</div>
</div>
<div id="group3" class="group">
  <div class="box red"></div>
  <div class="box blue"></div>
  <div class="box yellow"></div>
  <div class="number" onclick="goPage(document.getElementById('group3'),'WEEK 3.html')">3</div>
</div>
<div id="fade"></div>
<div class="cursor"></div>
<!-- 新增：信封按钮 -->
<img src="envelope.png" id="envelopeBtn" alt="Diary Button">
<!-- 新增：日记图片弹窗 -->
<div id="diaryModal">
  <span id="closeDiary">&times;</span>
  <img src="Diary.png" id="diaryImg" alt="Diary">
</div>

<script>
/*开灯*/
window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("light").style.opacity = 0;
  }, 100);
});
/* 点击动画（优化） */
function goPage(clickedGroup, url) {
  document.body.classList.add("no-hover");
  let groups = document.querySelectorAll(".group");
  groups.forEach(g => {
    if (g !== clickedGroup) {
      let boxes = g.querySelectorAll(".box");
      boxes.forEach((box, i) => {
        setTimeout(() => {
          box.style.transform = "scale(0)";
          box.style.opacity = "0";
        }, i * 80);
      });
      let num = g.querySelector(".number");
      setTimeout(() => {
        num.style.transform = "translate(-50%, -50%) scale(0)";
        num.style.opacity = "0";
      }, 100);
    }
  });
  let num = clickedGroup.querySelector(".number");
  num.style.transform = "translate(-50%, -50%) scale(0)";
  num.style.opacity = "0";
  setTimeout(() => {
    clickedGroup.style.left = "50%";
    clickedGroup.style.top = "50%";
    clickedGroup.style.transform = "translate(-50%, -50%) scale(14)";
  }, 200);
  /* 关灯（更快） */
  setTimeout(() => {
    document.getElementById("fade").style.opacity = 1;
  }, 600);
  /* ⏭ 跳转 */
  setTimeout(() => {
    window.location.href = url;
  }, 1300);
}
/* 星空（加速一点） */
const canvas = document.getElementById("starsCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;
let targetX = mouseX;
let targetY = mouseY;
document.addEventListener("mousemove", e => {
  targetX = e.clientX;
  targetY = e.clientY;
});
function smoothFollow() {
  mouseX += (targetX - mouseX) * 0.08;
  mouseY += (targetY - mouseY) * 0.08;
}
const layers = [
  { stars: [], speed: 0.02, count: 80 },
  { stars: [], speed: 0.05, count: 60 },
  { stars: [], speed: 0.08, count: 40 }
];
layers.forEach(layer => {
  for (let i = 0; i < layer.count; i++) {
    layer.stars.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      size: Math.random() * 1.2 + 0.3,
      twinkleOffset: Math.random() * Math.PI * 2
    });
  }
});
function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  smoothFollow();
  layers.forEach(layer => {
    layer.stars.forEach(star => {
      let offsetX = (mouseX - window.innerWidth / 2) * layer.speed;
      let offsetY = (mouseY - window.innerHeight / 2) * layer.speed;
      let twinkle = 0.5 + 0.5 * Math.sin(Date.now() * 0.001 + star.twinkleOffset);
      ctx.beginPath();
      ctx.arc(star.x + offsetX, star.y + offsetY, star.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${0.5 + twinkle * 0.5})`;
      ctx.fill();
    });
  });
  requestAnimationFrame(drawStars);
}
drawStars();
/*  鼠标 */
const cursor = document.querySelector(".cursor");
let trails = [];
const trailCount = 10;
for (let i = 0; i < trailCount; i++) {
  let t = document.createElement("div");
  t.className = "trail";
  document.body.appendChild(t);
  trails.push({ el: t, x: 0, y: 0 });
}
document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
  trails[0].x = e.clientX;
  trails[0].y = e.clientY;
});
function animate() {
  for (let i = trails.length - 1; i > 0; i--) {
    trails[i].x += (trails[i-1].x - trails[i].x) * 0.5;
    trails[i].y += (trails[i-1].y - trails[i].y) * 0.5;
  }
  trails.forEach((t, i) => {
    let scale = 1 - i / trailCount;
    let opacity = 1 - i / trailCount;
    t.el.style.width = 10 * scale + "px";
    t.el.style.height = 10 * scale + "px";
    t.el.style.opacity = opacity;
    t.el.style.left = t.x + "px";
    t.el.style.top = t.y + "px";
  });
  requestAnimationFrame(animate);
}
animate();
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
/* 新增：信封按钮和日记弹窗交互 */
const envelopeBtn = document.getElementById('envelopeBtn');
const diaryModal = document.getElementById('diaryModal');
const closeDiary = document.getElementById('closeDiary');
// 点击信封打开日记
envelopeBtn.addEventListener('click', () => {
  diaryModal.style.display = 'flex';
});
// 点击关闭按钮关闭日记
closeDiary.addEventListener('click', () => {
  diaryModal.style.display = 'none';
});
// 点击弹窗外层关闭日记
diaryModal.addEventListener('click', (e) => {
  if (e.target === diaryModal) {
    diaryModal.style.display = 'none';
  }
});
</script>
</body>
</html>
